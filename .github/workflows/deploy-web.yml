# deploy-web.yml
#
# Builds the ReplayLab Web Docker image, pushes it to GitHub Container Registry,
# and deploys it on the Docker host via a self-hosted runner.
#
# Triggers:
#   - Version tag push (v*.*.*) — automated deploy alongside NuGet release
#   - Manual workflow_dispatch — on-demand deploy
#
# Required setup on the Docker host (one-time):
#   - Self-hosted GitHub Actions runner with label 'dockhost'
#   - Docker and docker compose plugin installed
#   - Runner user in docker group
#   - Directory ~/replaylab-deploy/ writable by runner user
#   - Port 5213 reachable (or reverse proxy configured)

name: Deploy Web

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/replaylab-web

jobs:
  build:
    name: Build and push Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ReplayLab.sln

      - name: Build
        run: dotnet build ReplayLab.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test ReplayLab.sln --configuration Release --no-build

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Docker host
    runs-on: dockhost
    needs: build
    if: success()

    steps:
      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Deploy via docker compose
        run: |
          set -e

          IMAGE="ghcr.io/${{ github.repository_owner }}/replaylab-web:latest"
          COMPOSE_DIR="$HOME/replaylab-deploy"

          mkdir -p "$COMPOSE_DIR"

          cat > "$COMPOSE_DIR/docker-compose.yml" << COMPOSE_EOF
          services:
            web:
              image: ${IMAGE}
              ports:
                - "5213:5213"
              environment:
                - ASPNETCORE_URLS=http://+:5213
                - ASPNETCORE_ENVIRONMENT=Production
              restart: unless-stopped
          COMPOSE_EOF

          cd "$COMPOSE_DIR"

          echo "Pulling latest image..."
          docker compose pull web

          echo "Restarting web service..."
          docker compose up -d --force-recreate web

          echo "Deploy complete. Web UI at http://$(hostname -I | awk '{print $1}'):5213"
