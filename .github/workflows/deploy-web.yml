# deploy-web.yml
#
# Builds the ReplayLab Web Docker image, pushes it to GitHub Container Registry,
# and deploys it on the dockhost self-hosted runner.
#
# Triggers:
#   - Version tag push (v*.*.*) — automated deploy alongside NuGet release
#   - Manual workflow_dispatch — on-demand deploy
#
# Fork protection: the deploy job only runs on the upstream repository.
# In repo Settings → Actions → General → Fork pull request workflows, set
# "Require approval for all outside collaborators" as an additional guard.

name: Deploy Web

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/replaylab-web
  COMPOSE_DIR: /home/gh-runner/replaylab-deploy

jobs:
  build:
    name: Build and push Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ReplayLab.sln

      - name: Build
        run: dotnet build ReplayLab.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test ReplayLab.sln --configuration Release --no-build

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy on dockhost
    runs-on: dockhost
    needs: build
    if: success() && github.repository == 'sebastienwitz/replaylab'

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy web and seq
        run: |
          set -e

          cat > "$COMPOSE_DIR/docker-compose.yml" << 'COMPOSE_EOF'
          services:
            web:
              image: ghcr.io/sebastienwitz/replaylab-web:latest
              ports:
                - "5213:5213"
              environment:
                - ASPNETCORE_URLS=http://+:5213
                - ASPNETCORE_ENVIRONMENT=Production
                - SEQ_SERVER_URL=http://seq:5341
              restart: unless-stopped
              volumes:
                - dp-keys:/root/.aspnet/DataProtection-Keys

            seq:
              image: datalust/seq:latest
              ports:
                - "8222:80"
                - "5341:5341"
              environment:
                - ACCEPT_EULA=Y
                - SEQ_FIRSTRUN_NOAUTHENTICATION=true
              restart: unless-stopped
              volumes:
                - seq-data:/data

          volumes:
            seq-data:
            dp-keys:
          COMPOSE_EOF

          cd "$COMPOSE_DIR"

          echo "Pulling latest web image..."
          docker compose pull web

          echo "Redeploying web..."
          docker compose up -d --force-recreate web

          echo "Ensuring seq is running..."
          docker compose up -d seq

          echo "Deploy complete. Web UI at http://localhost:5213"
