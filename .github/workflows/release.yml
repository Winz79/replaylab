name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build, test, pack, and publish to GitHub Packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          dotnet-version: 10.0.x

      - name: Extract version from tag
        id: version
        run: echo "PACKAGE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore ReplayLab.sln

      - name: Build
        run: dotnet build ReplayLab.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test ReplayLab.sln --configuration Release --no-build

      - name: Verify C# formatting
        run: dotnet format ReplayLab.sln --verify-no-changes --verbosity minimal --no-restore

      - name: Verify JavaScript syntax
        run: node --check src/ReplayLab.Web.Hosting/wwwroot/js/replay-grid.js

      - name: Pack SDK packages
        run: |
          mkdir -p artifacts/packages
          PROJECTS=(
            "src/ReplayLab.Core/ReplayLab.Core.csproj"
            "src/ReplayLab.Parsers.Csv/ReplayLab.Parsers.Csv.csproj"
            "src/ReplayLab.Adapters.Mock/ReplayLab.Adapters.Mock.csproj"
            "src/ReplayLab.Adapters.Http/ReplayLab.Adapters.Http.csproj"
            "src/ReplayLab.Cli.Hosting/ReplayLab.Cli.Hosting.csproj"
            "src/ReplayLab.Web.Hosting/ReplayLab.Web.Hosting.csproj"
            "src/ReplayLab.Desktop.Hosting/ReplayLab.Desktop.Hosting.csproj"
          )
          for project in "${PROJECTS[@]}"; do
            echo "Packing $project ..."
            dotnet pack "$project" \
              --configuration Release \
              --output artifacts/packages \
              /p:Version=${{ steps.version.outputs.PACKAGE_VERSION }} \
              /p:PackageVersion=${{ steps.version.outputs.PACKAGE_VERSION }}
          done

      - name: Setup NuGet for GitHub Packages
        run: |
          dotnet nuget add source \
            "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --name github \
            --username ${{ github.actor }} \
            --password ${{ secrets.GITHUB_TOKEN }} \
            --store-password-in-clear-text

      - name: Publish packages to GitHub Packages
        run: |
          for pkg in artifacts/packages/*.nupkg; do
            echo "Publishing $pkg ..."
            dotnet nuget push "$pkg" \
              --source "github" \
              --api-key ${{ secrets.GITHUB_TOKEN }} \
              --skip-duplicate
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/packages/*.nupkg
